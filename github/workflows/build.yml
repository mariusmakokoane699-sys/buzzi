name: Build BUZZI APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: android-actions/setup-android@v2
        with:
          api-level: 31
          ndk-version: 25.1.8937393

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Init React Native project
        run: npx --yes react-native@0.76 init BuzziApp --package-name com.buzzi

      - name: Install dependencies
        working-directory: BuzziApp
        run: |
          npm install
          npm install @react-native-async-storage/async-storage@^2.1.0

      - name: Write BUZZI source files
        working-directory: BuzziApp
        run: |
          python3 << 'PYEOF'
          # ... [paste all the Python code from your original workflow here]
          PYEOF

      - name: Build APK
        working-directory: BuzziApp/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BUZZI-debug-apk
          path: BuzziApp/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
