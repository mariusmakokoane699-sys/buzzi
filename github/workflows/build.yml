# Build Workflow for Android

name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Setup JDK
      uses: actions/setup-java@v1
      with:
        java-version: '11'

    - name: Setup Android SDK
      env:
        ANDROID_HOME: /usr/local/androidsdk
      run: |
        mkdir -p $ANDROID_HOME;
        cd $ANDROID_HOME;
        wget https://dl.google.com/android/repository/commandlinetools-linux-6858069_latest.zip;
        unzip commandlinetools-linux-6858069_latest.zip;
        yes | sdkmanager --licenses;
        sdkmanager "platforms;android-30" "build-tools;30.0.3"

    - name: Setup NDK
      run: |
        wget https://dl.google.com/android/repository/android-ndk-r21d-linux-x86_64.zip;
        unzip android-ndk-r21d-linux-x86_64.zip -d $ANDROID_HOME/ndk;
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/android-ndk-r21d

    - name: Build Project
      run: |
        ./gradlew assembleDebug || { echo 'Build failed!'; exit 1; }

    - name: Deploy Artifact
      uses: actions/upload-artifact@v2
      with:
        name: android-build
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Cleanup
      run: |
        rm -rf $ANDROID_HOME/ndk/android-ndk-r21d
        rm -rf $ANDROID_HOME/commandlinetools

        
          
