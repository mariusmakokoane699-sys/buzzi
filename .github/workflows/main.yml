const W2I={};
DICT.forEach((w,i)=>{W2I[w]=i;});
function encode(text){
  return text.toLowerCase().replace(/[^a-z\s]/g,'').trim().split(/\s+/).filter(Boolean).map(w=>({
    word:w,index:W2I[w]??-1,found:W2I[w]!==undefined,ms:W2I[w]!==undefined?toMs(W2I[w]):null
  }));
}
function decode(indices){return indices.map(i=>DICT[i]??('[?'+i+']')).join(' ');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function mkid(){return 'm'+Date.now()+Math.random().toString(36).slice(2,6);}
function hhmm(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

async function requestPerms(){
  if(Platform.OS!=='android')return;
  await PermissionsAndroid.requestMultiple([
    PermissionsAndroid.PERMISSIONS.CALL_PHONE,
    PermissionsAndroid.PERMISSIONS.READ_PHONE_STATE,
    PermissionsAndroid.PERMISSIONS.READ_CALL_LOG,
    PermissionsAndroid.PERMISSIONS.READ_CONTACTS,
    PermissionsAndroid.PERMISSIONS.ANSWER_PHONE_CALLS,
  ]);
}

async function transmit(number,indices,onStep){
  await BuzziTelephony.triggerSignal(number,toMs(indices.length));
  haptic(); await sleep(300);
  for(let i=0;i<indices.length;i++){
    await BuzziTelephony.triggerSignal(number,toMs(indices[i]));
    haptic(); onStep(i+1,indices.length,DICT[indices[i]]||'');
    await sleep(250);
  }
}

export default function App(){
  const [screen,setScreen]=useState('home');
  const [ready,setReady]=useState(false);
  const [myNum,setMyNum]=useState('');
  const [showNumModal,setShowNumModal]=useState(false);
  const [numInput,setNumInput]=useState('');
  const [convos,setConvos]=useState({});
  const [contact,setContact]=useState(null);
  const [contacts,setContacts]=useState([]);
  const [contactQ,setContactQ]=useState('');
  const [loadingC,setLoadingC]=useState(false);
  const [input,setInput]=useState('');
  const [sending,setSending]=useState(false);
  const [prog,setProg]=useState({step:0,total:0,word:''});
  const [tokens,setTokens]=useState([]);
  const [inBuf,setInBuf]=useState([]);
  const inTimer=useRef(null);
  const listRef=useRef(null);
  const subRef=useRef(null);

  useEffect(()=>{boot();},[]);
  const boot=async()=>{
    await requestPerms();
    const n=await AsyncStorage.getItem('buzzi_num');
    if(n)setMyNum(n); else setShowNumModal(true);
    const raw=await AsyncStorage.getItem('buzzi_convos');
    if(raw)setConvos(JSON.parse(raw));
    setReady(true);
  };

  const saveNum=async()=>{
    const d=numInput.replace(/[^0-9]/g,'');
    if(d.length<9){Alert.alert('Invalid','Enter your full number');return;}
    const n=d.startsWith('0')?'+27'+d.slice(1):'+'+d;
    setMyNum(n);
    await AsyncStorage.setItem('buzzi_num',n);
    setShowNumModal(false);
  };

  const persist=async(c)=>{
    setConvos(c);
    await AsyncStorage.setItem('buzzi_convos',JSON.stringify(c));
  };

  const openContacts=async()=>{
    setLoadingC(true); setScreen('contacts'); setContactQ('');
    try{const list=await BuzziContacts.getContacts(); setContacts(list);}
    catch(e){Alert.alert('Error',e.message||'Grant READ_CONTACTS permission');}
    finally{setLoadingC(false);}
  };

  const openChat=(c)=>{
    setContact(c); setScreen('chat');
    setInput(''); setTokens([]); setInBuf([]);
    BuzziTelephony?.startListening(c.number).catch(()=>{});
    if(subRef.current){subRef.current.remove(); subRef.current=null;}
    subRef.current=emitter?.addListener('BuzziWordDecoded',(ev)=>{
      if(!ev.valid)return;
      haptic();
      setInBuf(b=>{
        const nb=[...b,ev.index];
        if(inTimer.current)clearTimeout(inTimer.current);
        inTimer.current=setTimeout(()=>{
          if(nb.length===0)return;
          const msg={id:mkid(),dir:'in',text:decode(nb),wc:nb.length,ic:nb.length,ts:Date.now(),status:'received'};
          setConvos(prev=>{
            const nxt={...prev};
            const id=c.id;
            if(!nxt[id])nxt[id]={name:c.name,number:c.number,msgs:[],words:0};
            nxt[id]={...nxt[id],msgs:[...nxt[id].msgs,msg]};
            AsyncStorage.setItem('buzzi_convos',JSON.stringify(nxt));
            return nxt;
          });
          setTimeout(()=>listRef.current?.scrollToEnd({animated:true}),100);
          setInBuf([]);
        },3000);
        return nb;
      });
    });
  };

  const appendMsg=(cid,cname,cnum,msg)=>{
    setConvos(prev=>{
      const nxt={...prev};
      if(!nxt[cid])nxt[cid]={name:cname,number:cnum,msgs:[],words:0};
      nxt[cid]={...nxt[cid],msgs:[...nxt[cid].msgs,msg],
        words:nxt[cid].words+(msg.dir==='out'?msg.wc:0)};
      AsyncStorage.setItem('buzzi_convos',JSON.stringify(nxt));
      return nxt;
    });
    setTimeout(()=>listRef.current?.scrollToEnd({animated:true}),100);
  };

  useEffect(()=>{if(input.trim())setTokens(encode(input));else setTokens([]);},[input]);

  const handleSend=useCallback(async()=>{
    if(!input.trim()||sending||!contact)return;
    const toks=encode(input.trim());
    const valid=toks.filter(t=>t.found).map(t=>t.index);
    if(!valid.length){Alert.alert('No matches','Try simpler words like: confirm payment send thank you');return;}
    setSending(true); setInput(''); setTokens([]);
    const msg={id:mkid(),dir:'out',text:input.trim(),wc:toks.length,ic:valid.length,ts:Date.now(),status:'sending'};
    appendMsg(contact.id,contact.name,contact.number,msg);
    try{
      await transmit(contact.number,valid,(s,t,word)=>setProg({step:s,total:t,word}));
      setConvos(prev=>{
        const nxt={...prev};
        if(nxt[contact.id])nxt[contact.id]={...nxt[contact.id],
          msgs:nxt[contact.id].msgs.map(m=>m.id===msg.id?{...m,status:'sent'}:m)};
        AsyncStorage.setItem('buzzi_convos',JSON.stringify(nxt));
        return nxt;
      });
    }catch(e){Alert.alert('Signal Error',e.message);}
    finally{setSending(false);setProg({step:0,total:0,word:''});}
  },[input,sending,contact]);

  const totalWords=Object.values(convos).reduce((s,c)=>s+c.words,0);
  const savings=(totalWords*COST).toFixed(2);
  const recentList=Object.entries(convos).map(([id,c])=>({id,...c}))
    .sort((a,b)=>(b.msgs.at(-1)?.ts||0)-(a.msgs.at(-1)?.ts||0));
  const msgs=contact?(convos[contact.id]?.msgs||[]):[];
  const filteredC=contactQ?contacts.filter(c=>
    c.name.toLowerCase().includes(contactQ.toLowerCase())||c.number.includes(contactQ)):contacts;

  if(!ready)return(
    <View style={[s.root,s.center]}>
      <Text style={s.logo}>BUZZI</Text>
      <ActivityIndicator color='#00BFFF' size='large' style={{marginTop:24}}/>
      <Text style={s.sub}>Initialising signal layer…</Text>
    </View>
  );

  if(screen==='contacts')return(
    <SafeAreaView style={s.root}>
      <StatusBar barStyle='dark-content' backgroundColor='#ffffff'/>
      <View style={s.hdr}>
        <TouchableOpacity onPress={()=>setScreen('home')}><Text style={s.back}>←</Text></TouchableOpacity>
        <View style={{flex:1,marginLeft:10}}>
          <Text style={s.hdrTitle}>New Signal</Text>
          <Text style={s.hdrSub}>{contacts.length} contacts</Text>
        </View>
      </View>
      <View style={s.searchWrap}>
        <TextInput style={s.search} value={contactQ} onChangeText={setContactQ}
          placeholder='Search contacts…' placeholderTextColor='#94a3b8'/>
        {contactQ?<TouchableOpacity onPress={()=>setContactQ('')}><Text style={s.clearQ}>✕</Text></TouchableOpacity>:null}
      </View>
      {loadingC
        ?<View style={s.center}><ActivityIndicator color='#00BFFF' size='large'/><Text style={s.sub}>Loading phonebook…</Text></View>
        :<FlatList data={filteredC} keyExtractor={c=>c.id} keyboardShouldPersistTaps='handled'
            contentContainerStyle={{padding:14,gap:8}}
            ListEmptyComponent={<View style={s.center}><Text style={{color:'#94a3b8',marginTop:40}}>No contacts found</Text></View>}
            renderItem={({item:c})=>(
              <TouchableOpacity style={s.contactRow} onPress={()=>openChat(c)} activeOpacity={0.7}>
                <View style={[s.av,{backgroundColor:c.avatarColor}]}>
                  {c.photo?<Image source={{uri:c.photo}} style={s.avImg}/>:<Text style={s.avTxt}>{c.initials}</Text>}
                </View>
                <View style={{flex:1,marginLeft:12}}>
                  <Text style={s.cName}>{c.name}</Text>
                  <Text style={s.cNum}>{c.number}</Text>
                </View>
                {c.starred&&<Text style={{fontSize:14}}>⭐</Text>}
              </TouchableOpacity>
            )}
          />
      }
    </SafeAreaView>
  );

  if(screen==='chat'&&contact)return(
    <KeyboardAvoidingView style={s.root} behavior={Platform.OS==='ios'?'padding':'height'}>
      <StatusBar barStyle='dark-content' backgroundColor='#ffffff'/>
      <View style={s.hdr}>
        <TouchableOpacity onPress={()=>{
          BuzziTelephony?.stopListening().catch(()=>{});
          subRef.current?.remove(); subRef.current=null;
          setScreen('home');
        }}><Text style={s.back}>←</Text></TouchableOpacity>
        <View style={[s.av,{backgroundColor:contact.avatarColor,marginLeft:8}]}>
          <Text style={s.avTxt}>{contact.initials}</Text>
        </View>
        <View style={{flex:1,marginLeft:10}}>
          <Text style={s.hdrTitle}>{contact.name}</Text>
          <Text style={s.hdrSub}>{contact.number} · 📡 Active</Text>
        </View>
        <View style={s.savPill}>
          <Text style={s.savPillTxt}>R{((convos[contact.id]?.words||0)*COST).toFixed(2)} saved</Text>
        </View>
      </View>
      {sending&&prog.total>0&&(
        <View style={s.progBar}>
          <Text style={s.progTxt}>📡 Sending "{prog.word}" — {prog.step}/{prog.total}</Text>
          <View style={s.progTrack}><View style={[s.progFill,{width:(prog.step/prog.total*100)+'%'}]}/></View>
        </View>
      )}
      {inBuf.length>0&&(
        <View style={s.inBar}>
          <ActivityIndicator size='small' color='#00BFFF'/>
          <Text style={s.inTxt}>Receiving… {inBuf.length} word{inBuf.length!==1?'s':''}</Text>
        </View>
      )}
      <FlatList ref={listRef} data={msgs} keyExtractor={m=>m.id}
        contentContainerStyle={{padding:16,flexGrow:1}}
        onContentSizeChange={()=>listRef.current?.scrollToEnd({animated:false})}
        ListEmptyComponent={
          <View style={[s.center,{paddingTop:60}]}>
            <Text style={{fontSize:56,marginBottom:16}}>📡</Text>
            <Text style={s.emptyTitle}>Begin Transmission</Text>
            <Text style={s.emptySub}>Messages travel as zero-rated{'\n'}missed calls on Vodacom.</Text>
          </View>
        }
        renderItem={({item:m})=>(
          <View style={{marginBottom:12,alignItems:m.dir==='out'?'flex-end':'flex-start'}}>
            <View style={[s.bubble,m.dir==='out'?s.bubOut:s.bubIn]}>
              <Text style={{fontSize:15,lineHeight:22,color:m.dir==='out'?'#fff':'#1e293b'}}>{m.text}</Text>
              <Text style={{fontSize:10,marginTop:5,color:m.dir==='out'?'rgba(255,255,255,0.6)':'#94a3b8'}}>
                {m.dir==='out'?`${m.ic}/${m.wc} indexed · ${m.status==='sending'?'⏳':'✓'}`:`${m.wc} words decoded`}
              </Text>
            </View>
            <Text style={s.ts}>{hhmm(m.ts)}</Text>
          </View>
        )}
      />
      {tokens.length>0&&(
        <View style={s.tokenRow}>
          {tokens.map((t,i)=>(
            <View key={i} style={[s.token,t.found?s.tokenOk:s.tokenBad]}>
              <Text style={{fontSize:12,fontWeight:'600',color:t.found?'#00BFFF':'#ef4444'}}>{t.word}</Text>
              {t.found&&<Text style={{fontSize:9,color:'#94a3b8'}}>{t.ms?.toFixed(0)}ms</Text>}
            </View>
          ))}
        </View>
      )}
      <View style={s.compose}>
        <TextInput style={s.compInput} value={input} onChangeText={setInput}
          placeholder='Compose signal…' placeholderTextColor='#94a3b8'
          multiline editable={!sending}/>
        <TouchableOpacity style={[s.sendBtn,(!input.trim()||sending)&&{opacity:0.4}]}
          onPress={handleSend} disabled={!input.trim()||sending}>
          {sending?<ActivityIndicator color='#fff' size='small'/>:<Text style={s.sendIcon}>↑</Text>}
        </TouchableOpacity>
      </View>
    </KeyboardAvoidingView>
  );

  return(
    <SafeAreaView style={s.root}>
      <StatusBar barStyle='dark-content' backgroundColor='#f0f8ff'/>
      <View style={s.hdr}>
        <View>
          <Text style={s.logo}>BUZZI</Text>
          <Text style={s.sub}>Zero-Rated Signal Messenger</Text>
        </View>
        <View style={s.savCard}>
          <Text style={{fontSize:8,fontWeight:'700',color:'#94a3b8',letterSpacing:1.5}}>SAVED</Text>
          <Text style={{fontSize:20,fontWeight:'700',color:'#00BFFF'}}>R{savings}</Text>
        </View>
      </View>
      <View style={s.statusRow}>
        <View style={s.pip}/>
        <Text style={{flex:1,fontSize:11,color:'#64748b'}}>Signal active · {myNum||'tap ✎ to set number'}</Text>
        <TouchableOpacity onPress={()=>setShowNumModal(true)}><Text style={{color:'#00BFFF',fontSize:15,padding:4}}>✎</Text></TouchableOpacity>
      </View>
      <FlatList data={recentList} keyExtractor={c=>c.id}
        contentContainerStyle={{padding:14,gap:8,flexGrow:1}}
        ListEmptyComponent={
          <View style={[s.center,{paddingTop:60}]}>
            <Text style={{fontSize:64,marginBottom:20}}>📡</Text>
            <Text style={s.emptyTitle}>No Conversations Yet</Text>
            <Text style={s.emptySub}>Tap + to start a zero-rated{'\n'}signal message with any contact.</Text>
            <TouchableOpacity style={s.startBtn} onPress={openContacts}>
              <Text style={s.startBtnTxt}>Open Contacts</Text>
            </TouchableOpacity>
          </View>
        }
        renderItem={({item:c})=>{
          const last=c.msgs.at(-1);
          return(
            <TouchableOpacity style={s.chatRow} onPress={()=>{
              openChat({id:c.id,name:c.name,number:c.number,rawNumber:c.number,
                initials:c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),
                avatarColor:'#00BFFF',photo:null,starred:false});
            }} activeOpacity={0.75}>
              <View style={[s.av,{backgroundColor:'#00BFFF'}]}>
                <Text style={s.avTxt}>{c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</Text>
              </View>
              <View style={{flex:1,marginLeft:12}}>
                <Text style={s.cName}>{c.name}</Text>
                <Text style={s.cNum} numberOfLines={1}>{last?.text||'No messages'}</Text>
              </View>
              <View style={{alignItems:'flex-end',gap:4}}>
                <Text style={{fontSize:11,color:'#94a3b8'}}>{last?hhmm(last.ts):''}</Text>
                <View style={s.savPill}><Text style={s.savPillTxt}>R{(c.words*COST).toFixed(2)}</Text></View>
              </View>
            </TouchableOpacity>
          );
        }}
      />
      <TouchableOpacity style={s.fab} onPress={openContacts}>
        <Text style={{fontSize:28,color:'#fff',lineHeight:32}}>+</Text>
      </TouchableOpacity>
      <Modal visible={showNumModal} transparent animationType='slide'>
        <View style={s.overlay}>
          <View style={s.modal}>
            <Text style={s.hdrTitle}>Your Vodacom Number</Text>
            <Text style={[s.sub,{marginBottom:20,marginTop:6}]}>Enter your number so contacts can signal back to you.</Text>
            <TextInput style={s.modalInput} value={numInput} onChangeText={setNumInput}
              placeholder='+27 82 000 0000' placeholderTextColor='#94a3b8'
              keyboardType='phone-pad' autoFocus/>
            <TouchableOpacity style={s.modalBtn} onPress={saveNum}>
              <Text style={s.modalBtnTxt}>Save & Continue</Text>
            </TouchableOpacity>
            {myNum?<TouchableOpacity style={{paddingVertical:14,alignItems:'center'}} onPress={()=>setShowNumModal(false)}>
              <Text style={{color:'#94a3b8'}}>Cancel</Text>
            </TouchableOpacity>:null}
          </View>
        </View>
      </Modal>
    </SafeAreaView>
  );
}

