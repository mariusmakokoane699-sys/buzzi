          w(KT + '/telephony/BuzziTelephonyModule.kt', '''package com.buzzi.telephony
import android.Manifest
import android.content.Context
import android.content.Intent
import android.content.pm.PackageManager
import android.net.Uri
import android.os.Build
import android.os.Handler
import android.os.Looper
import android.telecom.TelecomManager
import android.telephony.PhoneStateListener
import android.telephony.TelephonyManager
import android.util.Log
import androidx.core.app.ActivityCompat
import com.facebook.react.bridge.*
import com.facebook.react.modules.core.DeviceEventManagerModule
class BuzziTelephonyModule(private val ctx: ReactApplicationContext)
    : ReactContextBaseJavaModule(ctx) {
  companion object {
    const val BASE_MS = 500.0
    const val MAX_MS  = 2000.0
    const val EV_DECODED  = "BuzziWordDecoded"
    const val EV_SENT     = "BuzziSignalSent"
    const val EV_INCOMING = "BuzziIncomingSignal"
  }
  override fun getName() = "BuzziTelephony"
  private val handler = Handler(Looper.getMainLooper())
  private var hangup: Runnable? = null
  private var listener: PhoneStateListener? = null
  private var ringStart = 0L
  private var listening = false

  @ReactMethod
  fun triggerSignal(number: String, durationMs: Double, promise: Promise) {
    val activity = currentActivity ?: return promise.reject("NO_ACTIVITY","No activity")
    if (!hasPerm(Manifest.permission.CALL_PHONE))
      return promise.reject("NO_PERM","CALL_PHONE not granted")
    val ms = minOf(durationMs, MAX_MS).toLong()
    hangup?.let { handler.removeCallbacks(it) }
    try {
      activity.startActivity(
        Intent(Intent.ACTION_CALL, Uri.parse("tel:${clean(number)}")).apply {
          flags = Intent.FLAG_ACTIVITY_NEW_TASK })
      hangup = Runnable {
        endCall()
        handler.postDelayed({
          val res = Arguments.createMap().apply {
            putString("number", number)
            putDouble("requestedMs", durationMs)
            putDouble("clampedMs", ms.toDouble())
            putBoolean("success", true)
          }
          promise.resolve(res)
          emit(EV_SENT, res)
        }, 1200)
      }
      handler.postDelayed(hangup!!, ms)
    } catch (e: Exception) { promise.reject("ERR", e.message) }
  }

  @ReactMethod
  fun startListening(from: String, promise: Promise) {
    if (listening) return promise.resolve("already")
    if (!hasPerm(Manifest.permission.READ_PHONE_STATE))
      return promise.reject("NO_PERM","READ_PHONE_STATE not granted")
    val tm = ctx.getSystemService(Context.TELEPHONY_SERVICE) as TelephonyManager
    val fromTail = clean(from).takeLast(7)
    listener = object : PhoneStateListener() {
      override fun onCallStateChanged(state: Int, raw: String?) {
        val tail = raw?.replace(Regex("[^0-9]"),"")?.takeLast(7) ?: ""
        when (state) {
          TelephonyManager.CALL_STATE_RINGING -> {
            if (fromTail.isEmpty() || tail == fromTail) {
              ringStart = System.currentTimeMillis()
              emit(EV_INCOMING, Arguments.createMap().apply {
                putString("from", raw ?: ""); putString("event","RINGING") })
            }
          }
          TelephonyManager.CALL_STATE_IDLE -> {
            if (ringStart > 0) {
              val dur = System.currentTimeMillis() - ringStart
              ringStart = 0L
              val idx = Math.round((dur.toDouble() - BASE_MS) * 100).toInt()
              emit(EV_DECODED, Arguments.createMap().apply {
                putDouble("durationMs", dur.toDouble())
                putInt("index", idx)
                putString("from", raw ?: "")
                putBoolean("valid", idx in 0..500000)
              })
            }
          }
          TelephonyManager.CALL_STATE_OFFHOOK -> ringStart = 0L
        }
      }
    }
    @Suppress("DEPRECATION")
    tm.listen(listener, PhoneStateListener.LISTEN_CALL_STATE)
    listening = true
    promise.resolve("listening")
  }

  @ReactMethod
  fun stopListening(promise: Promise) {
    listener?.let {
      val tm = ctx.getSystemService(Context.TELEPHONY_SERVICE) as TelephonyManager
      @Suppress("DEPRECATION")
      tm.listen(it, PhoneStateListener.LISTEN_NONE)
      listener = null
    }
    listening = false
    promise.resolve("stopped")
  }

  @ReactMethod
  fun checkPermissions(promise: Promise) {
    promise.resolve(Arguments.createMap().apply {
      listOf("CALL_PHONE" to Manifest.permission.CALL_PHONE,
             "READ_PHONE_STATE" to Manifest.permission.READ_PHONE_STATE,
             "READ_CALL_LOG" to Manifest.permission.READ_CALL_LOG,
             "READ_CONTACTS" to Manifest.permission.READ_CONTACTS)
        .forEach { (k,v) -> putBoolean(k, hasPerm(v)) }
    })
  }

  private fun endCall(): Boolean {
    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.P && hasPerm(Manifest.permission.ANSWER_PHONE_CALLS)) {
      try {
        val tm = ctx.getSystemService(Context.TELECOM_SERVICE) as TelecomManager
        @Suppress("DEPRECATION")
        if (tm.endCall()) return true
      } catch (_: Exception) {}
    }
    try {
      val tm = ctx.getSystemService(Context.TELEPHONY_SERVICE) as TelephonyManager
      val m = tm.javaClass.getDeclaredMethod("getITelephony").apply { isAccessible=true }
      val it = m.invoke(tm)
      it.javaClass.getDeclaredMethod("endCall").apply { isAccessible=true }.invoke(it)
      return true
    } catch (_: Exception) {}
    return false
  }

  private fun emit(event: String, params: WritableMap?) =
    ctx.getJSModule(DeviceEventManagerModule.RCTDeviceEventEmitter::class.java).emit(event, params)
  private fun hasPerm(p: String) =
    ActivityCompat.checkSelfPermission(ctx, p) == PackageManager.PERMISSION_GRANTED
  private fun clean(n: String): String {
    val d = n.replace(Regex("[^0-9+]"),"")
    return if (d.startsWith("0") && d.length==10) "+27${d.drop(1)}" else d
  }
}
''')

