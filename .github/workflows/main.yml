          w(KT + '/contacts/BuzziContactsModule.kt', '''package com.buzzi.contacts
import android.Manifest
import android.content.pm.PackageManager
import android.provider.ContactsContract
import androidx.core.app.ActivityCompat
import com.facebook.react.bridge.*
class BuzziContactsModule(private val ctx: ReactApplicationContext)
    : ReactContextBaseJavaModule(ctx) {
  override fun getName() = "BuzziContacts"
  @ReactMethod
  fun getContacts(promise: Promise) {
    if (!hasPerm(Manifest.permission.READ_CONTACTS))
      return promise.reject("NO_PERM","READ_CONTACTS not granted")
    try {
      val arr = Arguments.createArray()
      val seen = mutableSetOf<String>()
      val cursor = ctx.contentResolver.query(
        ContactsContract.CommonDataKinds.Phone.CONTENT_URI,
        arrayOf(
          ContactsContract.CommonDataKinds.Phone.CONTACT_ID,
          ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME_PRIMARY,
          ContactsContract.CommonDataKinds.Phone.NUMBER,
          ContactsContract.CommonDataKinds.Phone.PHOTO_THUMBNAIL_URI,
          ContactsContract.CommonDataKinds.Phone.STARRED,
        ), null, null,
        "${ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME_PRIMARY} COLLATE NOCASE ASC"
      )
      cursor?.use { c ->
        val iId    = c.getColumnIndex(ContactsContract.CommonDataKinds.Phone.CONTACT_ID)
        val iName  = c.getColumnIndex(ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME_PRIMARY)
        val iNum   = c.getColumnIndex(ContactsContract.CommonDataKinds.Phone.NUMBER)
        val iPhoto = c.getColumnIndex(ContactsContract.CommonDataKinds.Phone.PHOTO_THUMBNAIL_URI)
        val iStar  = c.getColumnIndex(ContactsContract.CommonDataKinds.Phone.STARRED)
        while (c.moveToNext()) {
          val id = c.getString(iId) ?: continue
          if (seen.contains(id)) continue; seen.add(id)
          val name = c.getString(iName)?.trim() ?: continue
          val raw  = c.getString(iNum) ?: continue
          val num  = normalise(raw)
          val photo = c.getString(iPhoto)
          arr.pushMap(Arguments.createMap().apply {
            putString("id", id); putString("name", name)
            putString("number", num); putString("rawNumber", raw.trim())
            putString("initials", initials(name))
            putString("avatarColor", color(name))
            putBoolean("starred", c.getInt(iStar) == 1)
            if (photo != null) putString("photo", photo) else putNull("photo")
          })
        }
      }
      promise.resolve(arr)
    } catch (e: Exception) { promise.reject("ERR", e.message) }
  }
  @ReactMethod
  fun searchContacts(query: String, promise: Promise) {
    if (!hasPerm(Manifest.permission.READ_CONTACTS))
      return promise.reject("NO_PERM","READ_CONTACTS not granted")
    try {
      val arr = Arguments.createArray()
      val seen = mutableSetOf<String>()
      val q = "%${query.trim()}%"
      val cursor = ctx.contentResolver.query(
        ContactsContract.CommonDataKinds.Phone.CONTENT_URI,
        arrayOf(
          ContactsContract.CommonDataKinds.Phone.CONTACT_ID,
          ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME_PRIMARY,
          ContactsContract.CommonDataKinds.Phone.NUMBER,
          ContactsContract.CommonDataKinds.Phone.PHOTO_THUMBNAIL_URI,
        ),
        "${ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME_PRIMARY} LIKE ? OR ${ContactsContract.CommonDataKinds.Phone.NUMBER} LIKE ?",
        arrayOf(q, q),
        "${ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME_PRIMARY} ASC LIMIT 30"
      )
      cursor?.use { c ->
        val iId    = c.getColumnIndex(ContactsContract.CommonDataKinds.Phone.CONTACT_ID)
        val iName  = c.getColumnIndex(ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME_PRIMARY)
        val iNum   = c.getColumnIndex(ContactsContract.CommonDataKinds.Phone.NUMBER)
        val iPhoto = c.getColumnIndex(ContactsContract.CommonDataKinds.Phone.PHOTO_THUMBNAIL_URI)
        while (c.moveToNext()) {
          val id = c.getString(iId) ?: continue
          if (seen.contains(id)) continue; seen.add(id)
          val name = c.getString(iName)?.trim() ?: continue
          val num  = normalise(c.getString(iNum) ?: continue)
          arr.pushMap(Arguments.createMap().apply {
            putString("id", id); putString("name", name); putString("number", num)
            putString("initials", initials(name)); putString("avatarColor", color(name))
            val ph = c.getString(iPhoto); if (ph != null) putString("photo", ph) else putNull("photo")
          })
        }
      }
      promise.resolve(arr)
    } catch (e: Exception) { promise.reject("ERR", e.message) }
  }
  private fun normalise(raw: String): String {
    val d = raw.replace(Regex("[^0-9+]"), "")
    return when {
      d.startsWith("0") && d.length == 10 -> "+27${d.drop(1)}"
      d.startsWith("27") && d.length == 11 -> "+$d"
      else -> d
    }
  }
  private fun initials(name: String) =
    name.split(Regex("\\s+")).filter { it.isNotBlank() }.take(2)
      .mapNotNull { it.firstOrNull()?.uppercaseChar() }.joinToString("").ifEmpty { "?" }
  private fun color(name: String): String {
    val cols = listOf("#00BFFF","#0EA5E9","#7C3AED","#059669","#D97706","#DC2626","#0891B2","#9333EA")
    return cols[Math.abs(name.hashCode()) % cols.size]
  }
  private fun hasPerm(p: String) =
    ActivityCompat.checkSelfPermission(ctx, p) == PackageManager.PERMISSION_GRANTED
}
''')

