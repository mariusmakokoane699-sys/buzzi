
name: Build BUZZI APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android licences
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Init React Native project
        run: npx --yes react-native@0.76 init BuzziApp --package-name com.buzzi

      - name: Install extra dependencies
        working-directory: BuzziApp
        run: npm install @react-native-async-storage/async-storage@^2.1.0

      - name: Write all BUZZI source files
        working-directory: BuzziApp
        run: |
          python3 - << 'PYEOF'
          import os

          def w(path, txt):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              open(path, 'w').write(txt)

          KT = 'android/app/src/main/kotlin/com/buzzi'
          os.makedirs(KT + '/telephony', exist_ok=True)
          os.makedirs(KT + '/contacts', exist_ok=True)

