import AsyncStorage from '@react-native-async-storage/async-storage';

const {BuzziTelephony,BuzziContacts} = NativeModules;
const emitter = BuzziTelephony ? new NativeEventEmitter(BuzziTelephony) : null;

const BASE=500,MAX_MS=2000,COST=0.45;
const toMs=(i)=>Math.min(BASE+i/100,MAX_MS);
const haptic=()=>Vibration.vibrate([30,20,30]);

const DICT=[
