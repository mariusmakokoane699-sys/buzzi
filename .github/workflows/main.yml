          w(KT + '/telephony/SignalListenerService.kt', '''package com.buzzi.telephony
import android.app.*
import android.content.Context
import android.content.Intent
import android.os.Build
import android.os.IBinder
import androidx.core.app.NotificationCompat
import com.buzzi.MainActivity
class SignalListenerService : Service() {
  companion object {
    const val CHANNEL_ID = "buzzi_ch"
    const val NOTIF_ID = 1001
    fun start(ctx: Context) {
      val i = Intent(ctx, SignalListenerService::class.java)
      if (Build.VERSION.SDK_INT >= 26) ctx.startForegroundService(i) else ctx.startService(i)
    }
  }
  override fun onCreate() { super.onCreate(); createChannel() }
  override fun onStartCommand(i: Intent?, f: Int, id: Int): Int {
    startForeground(NOTIF_ID, buildNotif()); return START_STICKY
  }
  override fun onBind(i: Intent?): IBinder? = null
  private fun buildNotif(): Notification {
    val pi = PendingIntent.getActivity(this, 0,
      Intent(this, MainActivity::class.java),
      PendingIntent.FLAG_IMMUTABLE or PendingIntent.FLAG_UPDATE_CURRENT)
    return NotificationCompat.Builder(this, CHANNEL_ID)
      .setContentTitle("BUZZI Signal Active")
      .setContentText("Listening for incoming signals...")
      .setSmallIcon(android.R.drawable.ic_dialog_info)
      .setContentIntent(pi).setOngoing(true).setSilent(true).build()
  }
  private fun createChannel() {
    if (Build.VERSION.SDK_INT >= 26) {
      val ch = NotificationChannel(CHANNEL_ID, "Buzzi", NotificationManager.IMPORTANCE_LOW)
      (getSystemService(NOTIFICATION_SERVICE) as NotificationManager).createNotificationChannel(ch)
    }
  }
}
''')

          w(KT + '/telephony/BootReceiver.kt', '''package com.buzzi.telephony
